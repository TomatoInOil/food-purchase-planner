<div id="create-recipe" class="tab-content">
    <div class="card">
        <h2 class="card-title">Создать новый рецепт</h2>
        <form id="recipeForm" onsubmit="saveRecipe(event)">
            <div class="form-group">
                <label>Название рецепта</label>
                <input type="text" name="recipeName" required placeholder="Например: Греческий салат">
            </div>

            <div class="form-group">
                <label>Категория</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <select name="recipeCategory" id="recipeCategorySelect">
                        <option value="">Без категории</option>
                    </select>
                    <button type="button" class="btn btn-secondary btn-small" onclick="showNewCategoryInput()">+ Новая</button>
                </div>
                <div id="newCategoryInput" style="display: none; margin-top: 8px;">
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="text" id="newCategoryName" placeholder="Название категории">
                        <button type="button" class="btn btn-primary btn-small" onclick="createCategory()">Создать</button>
                        <button type="button" class="btn btn-secondary btn-small" onclick="hideNewCategoryInput()">Отмена</button>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="recipeDescription" placeholder="Краткое описание рецепта..."></textarea>
            </div>

            <div class="form-group">
                <label>Инструкция по приготовлению</label>
                <textarea name="recipeInstructions" placeholder="Опишите шаги приготовления..."></textarea>
            </div>

            <h3 class="form-section-title">Ингредиенты</h3>
            <div class="form-help">Вес ингредиентов заполняется на 1 порцию.</div>
            <div id="ingredientsContainer">
            </div>
            <button type="button" class="btn btn-secondary btn-small" onclick="addIngredientRow()">
                + Добавить ингредиент
            </button>

            <div class="nutrition-info" id="totalNutrition">
                <div class="nutrition-card">
                    <h4>Калории</h4>
                    <div class="value" id="totalCalories">0</div>
                    <small>ккал</small>
                </div>
                <div class="nutrition-card">
                    <h4>Белки</h4>
                    <div class="value" id="totalProtein">0</div>
                    <small>г</small>
                </div>
                <div class="nutrition-card">
                    <h4>Жиры</h4>
                    <div class="value" id="totalFat">0</div>
                    <small>г</small>
                </div>
                <div class="nutrition-card">
                    <h4>Углеводы</h4>
                    <div class="value" id="totalCarbs">0</div>
                    <small>г</small>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">💾 Сохранить рецепт</button>
                <button type="button" class="btn btn-secondary" onclick="clearRecipeForm()">🔄 Очистить</button>
            </div>
        </form>
    </div>
</div>
