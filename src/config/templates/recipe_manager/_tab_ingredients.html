<div id="ingredients" class="tab-content">
    <div class="card">
        <h2 class="card-title">База ингредиентов</h2>

        <div class="ingredient-form-section">
            <h3>Импорт из Пятёрочки</h3>
            <form id="importIngredientForm" onsubmit="importIngredientFromUrl(event)">
                <div class="import-row">
                    <div class="form-group" style="flex: 1;">
                        <label>Ссылка на продукт 5ka.ru</label>
                        <input type="url" name="importUrl" required
                               placeholder="https://5ka.ru/product/makarony-barilla-lazanya-500g--3020941/">
                    </div>
                    <button type="submit" class="btn btn-primary btn-import" id="importBtn">📥 Импорт</button>
                </div>
            </form>

            <div id="importHtmlFallback" style="display: none; margin-top: 1rem;">
                <input type="hidden" id="importFallbackUrl">
                <p class="text-muted" style="margin-bottom: 0.5rem;">
                    Не удалось загрузить страницу автоматически.
                    Откройте ссылку, скопируйте исходный код страницы
                    (Ctrl+U &rarr; Ctrl+A &rarr; Ctrl+C) и вставьте сюда:
                </p>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="openImportUrl()">🔗 Открыть ссылку</button>
                </div>
                <form onsubmit="importIngredientFromHtml(event)">
                    <div class="form-group">
                        <textarea id="importHtmlInput" rows="6"
                                  placeholder="Вставьте исходный код страницы сюда..."
                                  style="width: 100%; font-family: monospace; font-size: 0.85rem;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="importHtmlBtn">📥 Импортировать из вставленного кода</button>
                </form>
            </div>
        </div>

        <div class="ingredient-form-section">
            <h3>Добавить новый ингредиент</h3>
            <form id="ingredientForm" onsubmit="saveIngredient(event)">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" name="ingredientName" required placeholder="Например: Куриная грудка">
                    </div>
                    <div class="form-group">
                        <label>Калории (на 100г)</label>
                        <input type="number" name="calories" step="0.1" required placeholder="165">
                    </div>
                    <div class="form-group">
                        <label>Белки (г на 100г)</label>
                        <input type="number" name="protein" step="0.1" required placeholder="31">
                    </div>
                    <div class="form-group">
                        <label>Жиры (г на 100г)</label>
                        <input type="number" name="fat" step="0.1" required placeholder="3.6">
                    </div>
                    <div class="form-group">
                        <label>Углеводы (г на 100г)</label>
                        <input type="number" name="carbs" step="0.1" required placeholder="0">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">➕ Добавить ингредиент</button>
            </form>
        </div>

        <div class="search-box">
            <input type="text" placeholder="🔍 Поиск ингредиентов..." id="ingredientSearch" onkeyup="filterIngredients()">
        </div>

        <div class="ingredient-table-wrapper">
        <table class="ingredient-table" id="ingredientTable">
            <thead>
                <tr>
                    <th>Название</th>
                    <th><span class="th-full">Ккал</span><span class="th-short">К</span></th>
                    <th><span class="th-full">Белки, г</span><span class="th-short">Б</span></th>
                    <th><span class="th-full">Жиры, г</span><span class="th-short">Ж</span></th>
                    <th><span class="th-full">Углеводы, г</span><span class="th-short">У</span></th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="ingredientTableBody">
            </tbody>
        </table>
        </div>
    </div>
</div>
