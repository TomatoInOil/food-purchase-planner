<div id="menu" class="tab-content">
    <div class="card">
        <h2 class="card-title">Планирование меню на неделю</h2>
        <div class="form-group menu-owner-select">
            <label for="menuOwnerSelect">Меню для:</label>
            <select id="menuOwnerSelect" onchange="handleMenuOwnerChange()">
                <option value="">Моё меню</option>
            </select>
        </div>
        <div class="week-planner" id="weekPlanner">
        </div>
        <div class="card-actions">
            <button class="btn btn-primary" onclick="saveWeekMenu()">💾 Сохранить меню</button>
            <button type="button" id="clear-menu-btn" class="btn btn-danger" onclick="clearWeekMenu()" aria-label="Очистить меню">🔄</button>
        </div>
    </div>
    <div class="card">
        <h2 class="card-title">Список покупок <span id="shoppingOwnerLabel">(для меня)</span></h2>
        <div class="date-range">
            <div class="form-group">
                <label>От</label>
                <input type="date" id="shoppingStartDate">
            </div>
            <div class="form-group">
                <label>До</label>
                <input type="date" id="shoppingEndDate">
            </div>
            <div class="form-group">
                <label>Кол-во человек</label>
                <input type="number" id="shoppingPeopleCount" min="1" max="20" value="2">
            </div>
            <button class="btn btn-primary" onclick="generateShoppingList()">Сформировать список</button>
        </div>
        <div class="shopping-list" id="shoppingList">
            <div class="empty-state">
                <p>Выберите даты и нажмите "Сформировать список"</p>
            </div>
        </div>
    </div>
</div>
