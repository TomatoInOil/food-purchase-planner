<div id="menu" class="tab-content">
    <div class="menu-layout">
        <button class="menu-sidebar-toggle" id="menuSidebarToggle" onclick="toggleMenuSidebar()">
            ☰ Мои меню
        </button>
        <aside class="menu-sidebar" id="menuSidebar">
            <div class="menu-sidebar-header">
                <h3 id="menuSidebarTitle">Мои меню</h3>
                <button id="menuSidebarCreateBtn" class="btn btn-primary btn-small" onclick="createNewMenu()">+ Новое меню</button>
            </div>
            <div class="menu-sidebar-list" id="menuSidebarList">
            </div>
            <div class="cook-today-actions cook-today-actions--desktop">
                <button class="btn btn-primary" onclick="openCookToday()">🍳 Готовить сегодня</button>
            </div>
        </aside>
        <div class="menu-main">
            <div class="card">
                <h2 class="card-title" id="activeMenuTitle">Планирование меню на неделю</h2>
                <div class="cook-today-actions cook-today-actions--mobile">
                    <button class="btn btn-primary" onclick="openCookToday()">🍳 Готовить сегодня</button>
                </div>
                <div class="week-planner" id="weekPlanner">
                </div>
                <div class="card-actions">
                    <button class="btn btn-primary" onclick="saveWeekMenu()">💾 Сохранить меню</button>
                    <button type="button" id="clear-menu-btn" class="btn btn-danger" onclick="clearWeekMenu()" aria-label="Очистить меню">🔄</button>
                </div>
            </div>
            <div class="card">
                <h2 class="card-title">Список покупок <span id="shoppingOwnerLabel">(моё меню)</span></h2>
                <div class="date-range">
                    <div class="form-group">
                        <label>От</label>
                        <input type="date" id="shoppingStartDate">
                    </div>
                    <div class="form-group">
                        <label>До</label>
                        <input type="date" id="shoppingEndDate">
                    </div>
                    <div class="form-group">
                        <label>Множитель порций</label>
                        <input type="number" id="shoppingPeopleCount" min="1" max="20" value="2">
                    </div>
                    <button class="btn btn-primary" onclick="generateShoppingList()">Сформировать список</button>
                </div>
                <div class="shopping-list" id="shoppingList">
                    <div class="empty-state">
                        <p>Выберите даты и нажмите "Сформировать список"</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
