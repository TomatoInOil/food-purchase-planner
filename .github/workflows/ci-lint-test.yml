name: CI - lint (ruff, mypy) & tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version-file: .python-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          version-file: .python-version
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run Django tests
        run: uv run python src/manage.py test
