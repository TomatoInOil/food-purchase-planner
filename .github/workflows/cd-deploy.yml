name: CD - deploy via docker compose

on:
  workflow_run:
    workflows: ["Build and publish Docker image"]
    types:
      - completed
    branches:
      - master

  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy (e.g. latest or sha-xxxxx)
        required: false
        default: latest

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: read

    env:
      VDS_SSH_HOST: ${{ secrets.VDS_SSH_HOST }}
      VDS_SSH_USER: ${{ secrets.VDS_SSH_USER }}
      VDS_SSH_PORT: ${{ secrets.VDS_SSH_PORT }}
      DEPLOY_WORKDIR: ${{ secrets.DEPLOY_WORKDIR }}
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      GHCR_USER: ${{ secrets.GHCR_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Warn on manual deploy with default tag
        if: github.event_name == 'workflow_dispatch' && (inputs.image_tag == '' || inputs.image_tag == 'latest')
        run: echo "::warning::Manual deploy with tag 'latest'; ensure the build workflow succeeded."
        continue-on-error: true

      - name: Validate deploy config
        run: |
          MISSING=""
          [ -z "$VDS_SSH_HOST" ] && MISSING="$MISSING VDS_SSH_HOST"
          [ -z "$VDS_SSH_USER" ] && MISSING="$MISSING VDS_SSH_USER"
          [ -z "$VDS_SSH_KEY" ] && MISSING="$MISSING VDS_SSH_KEY"
          [ -z "$DEPLOY_WORKDIR" ] && MISSING="$MISSING DEPLOY_WORKDIR"
          [ -z "$POSTGRES_PASSWORD" ] && MISSING="$MISSING POSTGRES_PASSWORD"
          [ -z "$SECRET_KEY" ] && MISSING="$MISSING SECRET_KEY"
          [ -z "$ALLOWED_HOSTS" ] && MISSING="$MISSING ALLOWED_HOSTS"
          if [ -n "$MISSING" ]; then
            echo "::error::Required secrets are not set:$MISSING Add them in Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          VDS_SSH_HOST: ${{ secrets.VDS_SSH_HOST }}
          VDS_SSH_USER: ${{ secrets.VDS_SSH_USER }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
          DEPLOY_WORKDIR: ${{ secrets.DEPLOY_WORKDIR }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}

      - name: Check deploy files exist
        run: |
          test -f deploy.sh || (echo "::error::deploy.sh not found in repository." && exit 1)
          test -f docker-compose.prod.yml || (echo "::error::docker-compose.prod.yml not found in repository." && exit 1)

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VDS_SSH_HOST }}
          username: ${{ secrets.VDS_SSH_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_SSH_PORT }}
          source: "deploy.sh,docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_WORKDIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DEPLOY_WORKDIR: ${{ env.DEPLOY_WORKDIR }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_USER: ${{ env.GHCR_USER }}
          GHCR_TOKEN: ${{ env.GHCR_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
          GLITCHTIP_DSN: ${{ secrets.GLITCHTIP_DSN }}
          GLITCHTIP_ENVIRONMENT: ${{ secrets.GLITCHTIP_ENVIRONMENT }}
          GLITCHTIP_RELEASE: ${{ secrets.GLITCHTIP_RELEASE }}
        with:
          host: ${{ secrets.VDS_SSH_HOST }}
          username: ${{ secrets.VDS_SSH_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_SSH_PORT }}
          envs: IMAGE_TAG,DEPLOY_WORKDIR,GITHUB_REPOSITORY,GHCR_USER,GHCR_TOKEN,POSTGRES_PASSWORD,SECRET_KEY,POSTGRES_USER,POSTGRES_DB,ALLOWED_HOSTS,CSRF_TRUSTED_ORIGINS,GLITCHTIP_DSN,GLITCHTIP_ENVIRONMENT,GLITCHTIP_RELEASE
          script: |
            set -e
            WORKDIR="${DEPLOY_WORKDIR:-.}"
            cd "$WORKDIR"

            echo "Deploying..."
            GHCR_IMAGE=$(echo "ghcr.io/$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
            export GHCR_IMAGE
            {
              printf 'GHCR_IMAGE="%s"\n' "${GHCR_IMAGE//\"/\\\"}"
              printf 'IMAGE_TAG="%s"\n' "${IMAGE_TAG//\"/\\\"}"
              printf 'SECRET_KEY="%s"\n' "${SECRET_KEY//\"/\\\"}"
              printf 'DEBUG=0\n'
              printf 'ALLOWED_HOSTS="%s"\n' "${ALLOWED_HOSTS//\"/\\\"}"
              printf 'CSRF_TRUSTED_ORIGINS="%s"\n' "${CSRF_TRUSTED_ORIGINS//\"/\\\"}"
              printf 'POSTGRES_USER="%s"\n' "${POSTGRES_USER:-planner}"
              printf 'POSTGRES_PASSWORD="%s"\n' "${POSTGRES_PASSWORD//\"/\\\"}"
              printf 'POSTGRES_DB="%s"\n' "${POSTGRES_DB:-planner}"
              [ -n "$GLITCHTIP_DSN" ] && printf 'GLITCHTIP_DSN="%s"\n' "${GLITCHTIP_DSN//\"/\\\"}"
              [ -n "$GLITCHTIP_ENVIRONMENT" ] && printf 'GLITCHTIP_ENVIRONMENT="%s"\n' "${GLITCHTIP_ENVIRONMENT//\"/\\\"}"
              [ -n "$GLITCHTIP_RELEASE" ] && printf 'GLITCHTIP_RELEASE="%s"\n' "${GLITCHTIP_RELEASE//\"/\\\"}"
            } > .env
            chmod 600 .env
            bash deploy.sh "${IMAGE_TAG}"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_WORKDIR: ${{ secrets.DEPLOY_WORKDIR }}
        with:
          host: ${{ secrets.VDS_SSH_HOST }}
          username: ${{ secrets.VDS_SSH_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_SSH_PORT }}
          envs: DEPLOY_WORKDIR
          script: |
            set -e
            cd "${DEPLOY_WORKDIR:-.}"
            export COMPOSE_FILE=docker-compose.prod.yml
            echo "Waiting for web service (entrypoint runs migrate + collectstatic first)..."
            echo "Step 1: Waiting for container to be running..."
            timeout 30 bash -c 'until docker compose ps web | grep -q "Up"; do sleep 2; done' || {
              echo "::error::Web container did not start."
              docker compose ps web || true
              docker compose logs --tail=50 web || true
              exit 1
            }
            echo "Step 2: Waiting for port 8000 to be listening..."
            timeout 60 bash -c 'until docker compose exec -T web sh -c "nc -z 127.0.0.1 8000 || command -v nc >/dev/null || python -c \"import socket; s=socket.socket(); s.connect((\\\"127.0.0.1\\\", 8000)); s.close()\"" 2>/dev/null; do sleep 2; done' || {
              echo "::error::Port 8000 is not listening."
              docker compose logs --tail=50 web || true
              exit 1
            }
            echo "Step 3: Checking HTTP response (accepting any status < 500)..."
            if ! timeout 60 bash -c 'until docker compose exec -T web python -c "
            import urllib.request
            import sys
            try:
                resp = urllib.request.urlopen(\"http://127.0.0.1:8000/\", timeout=5)
                code = resp.getcode()
                if code < 500:
                    print(f\"HTTP {code} - OK\")
                    sys.exit(0)
                print(f\"HTTP {code} - Server error\", file=sys.stderr)
                sys.exit(1)
            except urllib.error.HTTPError as e:
                if e.code < 500:
                    print(f\"HTTP {e.code} - OK (non-critical)\")
                    sys.exit(0)
                print(f\"HTTP {e.code}: {e.reason}\", file=sys.stderr)
                sys.exit(1)
            except Exception as e:
                print(f\"Connection error: {e}\", file=sys.stderr)
                sys.exit(1)
            " 2>&1; do sleep 3; done'; then
              echo "::error::Web service did not respond correctly."
              docker compose logs --tail=50 web || true
              docker compose ps web || true
              exit 1
            fi
            echo "Deployment verified."
